<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python для початківців 🐍</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  <style>
    :root {
      --sidebar-bg: #1e1b4b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --green: #10b981;
      --green-hover: #059669;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --code-bg: #1e293b;
      --sidebar-width: 260px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-header h1 { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.3; }
    .sidebar-header p  { font-size: 12px; color: #a5b4fc; margin-top: 4px; }
    .chapter-list { padding: 12px 0; flex: 1; }
    .chapter-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
      color: #c7d2fe; font-size: 13.5px;
    }
    .chapter-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .chapter-item.active { background: rgba(99,102,241,0.2); border-left-color: var(--accent); color: #fff; }
    .chapter-item .ch-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .chapter-item.active .ch-num { background: var(--accent); }
    .chapter-item.done   .ch-num { background: var(--green); }
    .progress-bar-wrap { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
    .progress-label { font-size: 11px; color: #a5b4fc; margin-bottom: 6px; font-weight: 600; }
    .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }

    /* ── Loading ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(30,27,75,0.95);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; color: white;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay h2 { font-size: 20px; margin-bottom: 8px; }
    .loading-overlay p  { font-size: 14px; color: #a5b4fc; }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-width); flex: 1; min-width: 0; }
    .chapter-page { max-width: 800px; margin: 0 auto; padding: 48px 40px; }

    .chapter-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: white;
      font-size: 12px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px;
      margin-bottom: 16px; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .chapter-title { font-size: 32px; font-weight: 800; color: var(--text); margin-bottom: 8px; line-height: 1.2; }
    .chapter-intro { font-size: 16px; color: var(--text-light); margin-bottom: 36px; line-height: 1.7; }

    .chapter-page h3 { font-size: 20px; font-weight: 700; margin: 32px 0 12px; }
    .chapter-page p  { color: #374151; margin-bottom: 14px; line-height: 1.75; font-size: 15px; }
    .chapter-page ul, .chapter-page ol { margin: 0 0 16px 20px; color: #374151; font-size: 15px; line-height: 1.8; }

    .box { border-radius: 10px; padding: 16px 20px; margin: 20px 0; font-size: 14.5px; line-height: 1.7; }
    .box b { display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .box-tip     { background: #f0fdf4; border-left: 4px solid #10b981; color: #065f46; }
    .box-note    { background: #eff6ff; border-left: 4px solid #3b82f6; color: #1e40af; }
    .box-warning { background: #fffbeb; border-left: 4px solid #f59e0b; color: #92400e; }

    code {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      background: #f1f5f9; padding: 1px 6px;
      border-radius: 4px; font-size: 13px; color: #6366f1;
    }

    .code-example { background: var(--code-bg); border-radius: 10px; overflow: hidden; margin: 20px 0; }
    .code-example-header {
      background: rgba(255,255,255,0.05); padding: 8px 16px;
      font-size: 12px; color: #94a3b8;
      font-family: 'SF Mono', monospace;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .code-example pre {
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 14px; color: #e2e8f0;
      overflow-x: auto; line-height: 1.6; white-space: pre;
    }
    .kw { color: #c792ea; } .str { color: #c3e88d; } .num { color: #f78c6c; }
    .fn { color: #82aaff; } .cm { color: #546e7a; font-style: italic; } .op { color: #89ddff; }

    .concept-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
    .concept-table th {
      background: #f1f5f9; padding: 10px 14px; text-align: left;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b;
    }
    .concept-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-family: 'SF Mono', monospace; font-size: 13px; }
    .concept-table tr:last-child td { border-bottom: none; }
    .concept-table tr:nth-child(even) td { background: #f8fafc; }

    .divider { border: none; border-top: 2px dashed var(--border); margin: 40px 0; }

    /* ── Playground ── */
    .playground {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 14px; overflow: hidden; margin: 32px 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .playground-header {
      background: var(--code-bg); padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .playground-header span {
      color: #94a3b8; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .playground-header span::before {
      content: ''; display: inline-block;
      width: 10px; height: 10px; background: #10b981; border-radius: 50%;
    }
    .playground-actions { display: flex; gap: 8px; }
    .btn { padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-run { background: var(--green); color: white; }
    .btn-run:hover { background: var(--green-hover); }
    .btn-run:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-reset { background: rgba(255,255,255,0.1); color: #94a3b8; border: 1px solid rgba(255,255,255,0.15); }
    .btn-reset:hover { background: rgba(255,255,255,0.18); color: #e2e8f0; }

    .code-editor {
      width: 100%; min-height: 140px;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 14px; line-height: 1.6; padding: 16px;
      background: #0f172a; color: #e2e8f0;
      border: none; resize: vertical; outline: none; display: block; tab-size: 4;
    }
    .output-area { border-top: 1px solid rgba(255,255,255,0.08); background: #0a0f1e; min-height: 48px; }
    .output-label {
      padding: 8px 16px; font-size: 11px; color: #475569;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .output-text {
      padding: 12px 16px;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 13.5px; color: #a3e635;
      white-space: pre-wrap; min-height: 40px; line-height: 1.6;
    }
    .output-text.error   { color: #f87171; }
    .output-text.waiting { color: #64748b; font-style: italic; }

    /* ── Nav ── */
    .chapter-nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 48px; padding-top: 32px; border-top: 2px solid var(--border);
    }
    .btn-nav {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 2px solid var(--border);
      background: var(--surface); color: var(--text);
      transition: all 0.15s;
    }
    .btn-nav:hover { border-color: var(--accent); color: var(--accent); }
    .btn-nav.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-nav.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-nav.invisible { opacity: 0; pointer-events: none; }

    .finish-banner {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 16px; padding: 40px; text-align: center;
      color: white; margin-top: 32px;
    }
    .finish-banner .trophy { font-size: 56px; display: block; margin-bottom: 16px; }
    .finish-banner h2 { font-size: 28px; margin-bottom: 8px; }
    .finish-banner p { font-size: 16px; opacity: 0.85; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <h2>Завантаження Python... 🐍</h2>
  <p>Налаштовуємо середовище для програмування, зачекайте</p>
</div>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>🐍 Python для<br>початківців</h1>
    <p>Видання для 7 класу</p>
  </div>
  <nav class="chapter-list" id="chapterList"></nav>
  <div class="progress-bar-wrap">
    <div class="progress-label" id="progressLabel">Розділ 1 з 10</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  </div>
</aside>

<main class="main">
  <div class="chapter-page" id="chapterPage"></div>
</main>

<script>
// ── Дані розділів ─────────────────────────────────────────────────────────────

const chapters = [
  {

      <h3>Що таке програмування?</h3>

      <h3>Що таке Python?</h3>

      <div class="box box-tip"><b>🐍 Чому Python?</b>Python читається майже як звичайна мова. Замість складних символів ти пишеш зрозумілі, прості інструкції — ідеально для початківців.</div>

      <div class="code-example"><div class="code-example-header">python · приклад</div><pre><span class="fn">print</span>(<span class="str">"Привіт, Світе!"</span>)
<span class="fn">print</span>(<span class="str">"Я вчусь Python!"</span>)</pre></div>
      <div class="box box-note"><b>📝 Лапки</b>Текст усередині print() завжди має бути в лапках — одинарні <code>'привіт'</code> або подвійні <code>"привіт"</code> — обидва варіанти працюють.</div>
      <h3>Спробуй сам!</h3>
      <p>Редагуй код нижче і натисни <strong>Запустити</strong>, щоб побачити результат. Спробуй додати більше рядків <code>print()</code>!</p>

    initialCode: `print("Привіт, Світе!")

    content: `
      <h3>Що таке змінна?</h3>
      <p>Уяви коробку з підписом «вік» і числом 13 всередині. Коли тобі потрібен твій вік — просто заглянь у коробку «вік». Це і є змінна.</p>
      <div class="code-example"><div class="code-example-header">python · створення змінних</div><pre>name = <span class="str">"Олексій"</span>
age  = <span class="num">13</span>
city = <span class="str">"Київ"</span>

<span class="fn">print</span>(name)
<span class="fn">print</span>(age)</pre></div>
      <h3>Правила іменування</h3>
      <ul>
        <li>Лише літери, цифри та підкреслення</li>
        <li>Не може <em>починатись</em> з цифри</li>
        <li>Без пробілів — використовуй <code>my_name</code>, а не <code>my name</code></li>
        <li>Регістр важливий: <code>Name</code> ≠ <code>name</code></li>
      </ul>
      <div class="box box-warning"><b>⚠️ Недійсні імена</b><code>2cool</code>, <code>my name</code>, <code>class</code> (зарезервоване слово) — усі вони викликають помилки.</div>
      <h3>Поширені типи</h3>
      <table class="concept-table">
        <tr><th>Тип</th><th>Приклад</th><th>Зберігає</th></tr>
        <tr><td>str</td><td>name = "Аліса"</td><td>Текст</td></tr>
        <tr><td>int</td><td>age = 13</td><td>Цілі числа</td></tr>
        <tr><td>float</td><td>height = 1.65</td><td>Десяткові числа</td></tr>
        <tr><td>bool</td><td>happy = True</td><td>True або False</td></tr>
      </table>
      <div class="box box-tip"><b>💡 Змінні можуть змінюватись!</b>Саме тому вони називаються <em>змінними</em>. <code>score = 0</code> а потім <code>score = 10</code> — абсолютно нормально.</div>
    `,
    initialCode: `# Заповни своїми даними!

print("Клас:", grade)
print("Улюблений предмет:", subject)

# Змінні можуть змінюватись
score = 0
print("Рахунок:", score)
score = 100
print("Новий рахунок:", score)`

  {
    id: 3, emoji: "🔢", title: "Числа та математика",
    intro: "Python — це потужний калькулятор. Давай дослідимо арифметику і побачимо, які трюки ховаються у числах.",
    content: `
      <h3>Два види чисел</h3>
      <p><strong>int</strong> — цілі числа: <code>5</code>, <code>-3</code>, <code>1000</code><br>

        <tr><td>/</td><td>Ділення</td><td>10 / 3</td><td>3.333…</td></tr>
        <tr><td>//</td><td>Цілочисельне ділення</td><td>10 // 3</td><td>3</td></tr>

    content: `
      <h3>Створення рядків</h3>

  const isLast  = idx === chapters.length - 1;

  document.getElementById('chapterPage').innerHTML = `
    <div class="chapter-badge">Розділ ${ch.id} з ${chapters.length}</div>
    <h1 class="chapter-title">${ch.emoji} ${ch.title}</h1>
    <p class="chapter-intro">${ch.intro}</p>

    ${ch.content}

    <hr class="divider">

    <div class="playground">
      <div class="playground-header">
        <span>Python Майданчик</span>
        <div class="playground-actions">
          <button class="btn btn-reset" onclick="resetCode()">Скинути</button>
          <button class="btn btn-run" id="runBtn" onclick="runCode()" ${pyodideReady ? '' : 'disabled'}>
            ${pyodideReady ? '▶ Запустити' : '⏳ Завантаження...'}
          </button>
        </div>
      </div>
      <textarea class="code-editor" id="codeEditor" spellcheck="false">${ch.initialCode}</textarea>
      <div class="output-area">
        <div class="output-label">Результат</div>
        <div class="output-text waiting" id="outputText">Натисни Ctrl+Enter або кнопку Запустити…</div>
      </div>
    </div>

    <div class="chapter-nav">
      <button class="btn-nav ${isFirst ? 'invisible' : ''}" onclick="goTo(${idx - 1})">← Назад</button>
      <button class="btn-nav primary" onclick="advance(${idx})">${isLast ? '🏆 Завершити' : 'Далі →'}</button>
    </div>
  `;

  document.getElementById('codeEditor').addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = e.target, s = ta.selectionStart;
      ta.value = ta.value.slice(0, s) + '    ' + ta.value.slice(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 4;
    }
  });

  window.scrollTo(0, 0);
}

// ── Навігація ─────────────────────────────────────────────────────────────────

function goTo(idx) {
  currentChapter = idx;
  renderSidebar();
  renderChapter(idx);
}

function advance(idx) {
  done.add(idx);
  if (idx < chapters.length - 1) {
    goTo(idx + 1);
  } else {
    renderSidebar();
    document.getElementById('chapterPage').insertAdjacentHTML('beforeend', `
      <div class="finish-banner">
        <span class="trophy">🏆</span>
        <h2>Ти дочитав книгу!</h2>
        <p>Ти опанував основи Python. Продовжуй будувати проєкти — саме так ростуть справжні програмісти.</p>
      </div>`);
  }
}

// ── Виконання коду ────────────────────────────────────────────────────────────

async function runCode() {
  if (!pyodideReady) return;
  const code   = document.getElementById('codeEditor').value;
  const out    = document.getElementById('outputText');
  const runBtn = document.getElementById('runBtn');

  out.className = 'output-text waiting';
  out.textContent = 'Виконується…';
  runBtn.disabled = true;
  runBtn.textContent = '⏳';

  try {
    await pyodide.runPythonAsync(`
import sys, io as _io
sys.stdout = _io.StringIO()
sys.stderr = _io.StringIO()
`);
    await pyodide.runPythonAsync(code);
    const stdout = pyodide.runPython('sys.stdout.getvalue()');
    const stderr = pyodide.runPython('sys.stderr.getvalue()');
    out.className = 'output-text';
    out.textContent = (stdout + stderr).trim() || '(немає виводу)';
  } catch (err) {
    out.className = 'output-text error';
    out.textContent = '🔴 ' + err.message;
  } finally {
    runBtn.disabled = false;
    runBtn.textContent = '▶ Запустити';
  }
}

function resetCode() {
  document.getElementById('codeEditor').value = chapters[currentChapter].initialCode;
  document.getElementById('outputText').className = 'output-text waiting';
  document.getElementById('outputText').textContent = 'Натисни Ctrl+Enter або кнопку Запустити…';
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') runCode();
});

// ── Запуск ────────────────────────────────────────────────────────────────────

renderSidebar();
renderChapter(0);
initPyodide();
</script>
</body>
</html>
